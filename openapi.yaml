openapi: 3.1.0
info:
  title: Error Logging API
  version: 1.0.0
  summary: Project-based API for provisioning tokens and ingesting application errors.
  description: >
    A platform-agnostic error logging API that provisions per-project API tokens
    and accepts structured error events from web, backend, mobile, CLI, or worker
    runtimes. The payload is intentionally flexible so callers can attach
    runtime-specific details from environments such as Next.js, Python, Node.js,
    or other systems.

servers:
  - url: https://api.example.com
    description: Production

tags:
  - name: Projects
    description: Create projects and issue ingestion tokens.
  - name: Error Logs
    description: Submit structured error events.
  - name: Local
    description: Local onboarding and repository configuration endpoints.

paths:
  /v1/projects:
    post:
      tags:
        - Projects
      operationId: createProject
      summary: Create a project
      description: >
        Creates a new project and returns the long-lived API token that should be
        used when sending error logs for that project.
      security:
        - adminTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            example:
              name: aura-web
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreated'
              example:
                id: proj_01HSV70H854RZ8B4C2Q5QF6X5A
                name: aura-web
                token: ak_95f20e153965417ba49d7d88c240b4fb4fbc2f63fcc74291
                createdAt: "2026-04-18T08:30:00Z"
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                message: body.name must be a non-empty string
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: Admin token is missing or invalid
  /v1/logs/errors:
    post:
      tags:
        - Error Logs
      operationId: createErrorLog
      summary: Submit an error log event
      description: >
        Accepts a single error event with platform metadata, normalized error
        attributes, and arbitrary structured details supplied by the client.
      security:
        - apiTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorLogRequest'
            examples:
              nextjs:
                summary: Next.js application error
                value:
                  eventId: 767d5a66-2b41-4c2e-90e8-6dd0149491df
                  occurredAt: "2026-04-18T08:32:17Z"
                  level: error
                  platform: web
                  environment: production
                  service:
                    name: aura-web
                    version: "2026.04.18"
                  source:
                    runtime: node
                    language: typescript
                    framework: next.js
                    component: app-router
                  error:
                    type: TypeError
                    message: Cannot read properties of undefined
                    stack: "TypeError: Cannot read properties of undefined\n    at DashboardPage..."
                    handled: false
                    details:
                      route: /dashboard
                      digest: NEXT_APP_ERROR_01
                      buildId: b42a9a1
                  context:
                    request:
                      method: GET
                      path: /dashboard
                      requestId: req_123
                    user:
                      id: user_42
                    tags:
                      - frontend
                      - nextjs
              python:
                summary: Python backend exception
                value:
                  eventId: b453b95e-0dbb-4b71-978d-f61dcb50adf9
                  occurredAt: "2026-04-18T08:35:02Z"
                  level: critical
                  platform: backend
                  environment: production
                  service:
                    name: aura-api
                    version: "1.12.3"
                  source:
                    runtime: cpython
                    language: python
                    framework: fastapi
                    component: billing-worker
                  error:
                    type: ValueError
                    message: Invalid invoice state transition
                    stack: "Traceback (most recent call last): ..."
                    code: INVALID_STATE
                    handled: true
                    details:
                      module: billing.jobs.reconcile
                      exceptionClass: ValueError
                      invoiceId: inv_987
                      previousState: paid
                      requestedState: refunded
                  context:
                    correlationId: corr_789
                    tags:
                      - backend
                      - billing
      responses:
        '202':
          description: Error log accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorLogAccepted'
              example:
                id: log_01HSV6M2KQ4T1TA7R8P8W9J1BM
                status: accepted
                receivedAt: "2026-04-18T08:32:18Z"
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                message: occurredAt must be a valid RFC 3339 timestamp
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: API token is missing or invalid
  /v1/local/collector-selection:
    post:
      tags:
        - Local
      operationId: selectCollector
      summary: Select the best local collector for a repository
      description: >
        Accepts repository signals from the local CLI and asks the backend to
        broker a local Codex selector call. Falls back to deterministic
        heuristics if the selector fails.
      security:
        - adminTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectorSelectionRequest'
      responses:
        '200':
          description: Collector selection completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectorSelectionResult'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/local/projects/{projectId}/config:
    put:
      tags:
        - Local
      operationId: upsertProjectConfig
      summary: Create or update local project repair configuration
      security:
        - adminTokenAuth: []
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectConfigRequest'
      responses:
        '200':
          description: Project config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectConfig'
        '201':
          description: Project config created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectConfig'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/local/projects/{projectId}/status:
    get:
      tags:
        - Local
      operationId: getLocalProjectStatus
      summary: Get local project workflow status
      security:
        - adminTokenAuth: []
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Local project status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalProjectStatus'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/local/error-groups:
    get:
      tags:
        - Local
      operationId: listLocalErrorGroups
      summary: List local error groups for a project
      security:
        - adminTokenAuth: []
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Error groups for the project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorGroupList'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/local/repair-attempts:
    get:
      tags:
        - Local
      operationId: listLocalRepairAttempts
      summary: List local repair attempts for a project
      security:
        - adminTokenAuth: []
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repair attempts for the project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairAttemptList'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/local/repair-jobs/claim:
    post:
      tags:
        - Local
      operationId: claimLocalRepairJob
      summary: Claim the next pending local repair job
      security:
        - adminTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepairJobClaimRequest'
      responses:
        '200':
          description: Repair job claim result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairJobClaimResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Job exists but cannot be materialized due to missing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/local/repair-jobs/{jobId}/complete:
    post:
      tags:
        - Local
      operationId: completeLocalRepairJob
      summary: Complete a local repair job attempt
      security:
        - adminTokenAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepairJobCompleteRequest'
      responses:
        '200':
          description: Repair job completion recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairJobCompleted'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Repair attempt not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    adminTokenAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Administrative token used to create new projects.
    apiTokenAuth:
      type: apiKey
      in: header
      name: X-API-Token
      description: Long-lived API token permanently issued for a specific project.

  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable project name.
          examples:
            - aura-web
            - aura-api

    ProjectCreated:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - token
        - createdAt
      properties:
        id:
          type: string
          description: Server-generated project identifier.
        name:
          type: string
          description: Human-readable project name.
        token:
          type: string
          description: Project token to include in the X-API-Token header for log ingestion.
        createdAt:
          type: string
          format: date-time

    CollectorInventoryItem:
      type: object
      additionalProperties: false
      required:
        - id
        - runtime
        - description
        - installStrategy
      properties:
        id:
          type: string
        runtime:
          type: string
        framework:
          type: string
        description:
          type: string
        installStrategy:
          type: string
          enum:
            - dependency
            - vendor

    CollectorSelectionRequest:
      type: object
      additionalProperties: false
      required:
        - repoPath
        - runtimeCandidates
        - frameworkCandidates
        - topLevelFiles
        - lockfiles
        - likelyEntrypoints
        - collectorInventory
        - autoPatchAllowed
      properties:
        repoPath:
          type: string
        packageManager:
          type: string
        runtimeCandidates:
          type: array
          items:
            type: string
        frameworkCandidates:
          type: array
          items:
            type: string
        topLevelFiles:
          type: array
          items:
            type: string
        lockfiles:
          type: array
          items:
            type: string
        likelyEntrypoints:
          type: array
          items:
            type: string
        packageManifest:
          $ref: '#/components/schemas/JsonObject'
        collectorInventory:
          type: array
          items:
            $ref: '#/components/schemas/CollectorInventoryItem'
        autoPatchAllowed:
          type: boolean

    CollectorSelectionResult:
      type: object
      additionalProperties: false
      required:
        - collectorId
        - runtime
        - strategy
        - bootstrapFile
        - patchMode
        - confidence
        - reason
        - edits
        - warnings
        - selectorSource
      properties:
        collectorId:
          type: string
        runtime:
          type: string
        framework:
          type: string
        strategy:
          type: string
          enum:
            - dependency
            - vendor
            - manual_only
        bootstrapFile:
          type: string
        entrypointPath:
          type: string
        patchMode:
          type: string
          enum:
            - auto_patch
            - generate_import_only
        confidence:
          type: number
          minimum: 0
          maximum: 1
        reason:
          type: string
        edits:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        selectorSource:
          type: string
          enum:
            - codex
            - fallback

    ProjectConfigRequest:
      type: object
      additionalProperties: false
      required:
        - serviceName
        - repoPath
        - runtime
        - allowedRepairPaths
      properties:
        serviceName:
          type: string
        repoPath:
          type: string
        runtime:
          type: string
        framework:
          type: string
        packageManager:
          type: string
        installCommand:
          type: string
        testCommand:
          type: string
        entrypointPath:
          type: string
        endpoint:
          type: string
        tokenEnvVar:
          type: string
        allowedRepairPaths:
          type: array
          items:
            type: string

    ProjectConfig:
      type: object
      additionalProperties: false
      required:
        - projectId
        - serviceName
        - repoPath
        - runtime
        - allowedRepairPaths
        - updatedAt
      properties:
        projectId:
          type: string
        serviceName:
          type: string
        repoPath:
          type: string
        runtime:
          type: string
        framework:
          type: string
        packageManager:
          type: string
        installCommand:
          type: string
        testCommand:
          type: string
        entrypointPath:
          type: string
        endpoint:
          type: string
        tokenEnvVar:
          type: string
        allowedRepairPaths:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time

    ErrorGroup:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - fingerprint
        - status
        - firstSeenAt
        - lastSeenAt
        - eventCount
        - representativeLogId
        - lastLogId
      properties:
        id:
          type: string
        projectId:
          type: string
        fingerprint:
          type: string
        status:
          type: string
          enum:
            - open
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        eventCount:
          type: integer
        representativeLogId:
          type: string
        lastLogId:
          type: string

    ErrorGroupList:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ErrorGroup'

    RepairAttempt:
      type: object
      additionalProperties: false
      required:
        - id
        - jobId
        - projectId
        - errorGroupId
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        jobId:
          type: string
        projectId:
          type: string
        errorGroupId:
          type: string
        status:
          type: string
          enum:
            - running
            - patched
            - failed
            - needs_manual_review
        workerId:
          type: string
        replicatorHandoffPath:
          type: string
        patchSummary:
          type: string
        verificationCommand:
          type: string
        verificationExitCode:
          type: integer
        confidence:
          type: number
          minimum: 0
          maximum: 1
        runDirectory:
          type: string
        resultPayload:
          $ref: '#/components/schemas/JsonObject'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    RepairAttemptList:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RepairAttempt'

    RepairJobClaimRequest:
      type: object
      additionalProperties: false
      required:
        - workerId
      properties:
        workerId:
          type: string

    RepairJob:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - errorGroupId
        - attemptNumber
        - status
        - availableAt
        - claimedAt
        - workerId
      properties:
        id:
          type: string
        projectId:
          type: string
        errorGroupId:
          type: string
        attemptNumber:
          type: integer
        status:
          type: string
          enum:
            - claimed
        availableAt:
          type: string
          format: date-time
        claimedAt:
          type: string
          format: date-time
        workerId:
          type: string

    RepairJobClaimedAttempt:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - workerId
        - createdAt
      properties:
        id:
          type: string
        status:
          type: string
          enum:
            - running
        workerId:
          type: string
        createdAt:
          type: string
          format: date-time

    LocalProjectStatus:
      type: object
      additionalProperties: false
      required:
        - project
        - projectConfig
        - queue
        - errorGroups
        - repairAttempts
      properties:
        project:
          type: object
          additionalProperties: false
          required:
            - id
            - name
            - createdAt
          properties:
            id:
              type: string
            name:
              type: string
            createdAt:
              type: string
              format: date-time
        projectConfig:
          $ref: '#/components/schemas/ProjectConfig'
        queue:
          type: object
          additionalProperties: false
          required:
            - pending
            - claimed
            - completed
            - failed
            - manualReview
          properties:
            pending:
              type: integer
            claimed:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            manualReview:
              type: integer
        errorGroups:
          type: object
          additionalProperties: false
          required:
            - total
            - open
            - latest
          properties:
            total:
              type: integer
            open:
              type: integer
            latest:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - lastSeenAt
                  - eventCount
                  - representativeLogId
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  lastSeenAt:
                    type: string
                    format: date-time
                  eventCount:
                    type: integer
                  representativeLogId:
                    type: string
        repairAttempts:
          type: object
          additionalProperties: false
          required:
            - total
            - running
            - patched
            - failed
            - manualReview
            - latest
          properties:
            total:
              type: integer
            running:
              type: integer
            patched:
              type: integer
            failed:
              type: integer
            manualReview:
              type: integer
            latest:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - id
                  - jobId
                  - status
                  - createdAt
                properties:
                  id:
                    type: string
                  jobId:
                    type: string
                  status:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  completedAt:
                    type: string
                    format: date-time
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1

    RepairJobClaimResponse:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - job
          properties:
            job:
              type: 'null'
        - type: object
          additionalProperties: false
          required:
            - job
            - attempt
            - projectConfig
            - errorGroup
            - representativeLog
          properties:
            job:
              $ref: '#/components/schemas/RepairJob'
            attempt:
              $ref: '#/components/schemas/RepairJobClaimedAttempt'
            projectConfig:
              $ref: '#/components/schemas/ProjectConfig'
            errorGroup:
              $ref: '#/components/schemas/ErrorGroup'
            representativeLog:
              $ref: '#/components/schemas/JsonObject'

    RepairJobCompleteRequest:
      type: object
      additionalProperties: false
      required:
        - attemptId
        - status
      properties:
        attemptId:
          type: string
        status:
          type: string
          enum:
            - patched
            - failed
            - needs_manual_review
        replicatorHandoffPath:
          type: string
        patchSummary:
          type: string
        verificationCommand:
          type: string
        verificationExitCode:
          type: integer
        verificationStdout:
          type: string
        verificationStderr:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        runDirectory:
          type: string
        resultPayload:
          $ref: '#/components/schemas/JsonObject'
        failureReason:
          type: string

    RepairJobCompleted:
      type: object
      additionalProperties: false
      required:
        - jobId
        - attemptId
        - status
        - completedAt
      properties:
        jobId:
          type: string
        attemptId:
          type: string
        status:
          type: string
          enum:
            - patched
            - failed
            - needs_manual_review
        completedAt:
          type: string
          format: date-time

    ErrorLogRequest:
      type: object
      additionalProperties: false
      required:
        - occurredAt
        - level
        - platform
        - service
        - source
        - error
      properties:
        eventId:
          type: string
          description: Client-generated identifier for idempotency or correlation.
          examples:
            - 767d5a66-2b41-4c2e-90e8-6dd0149491df
        occurredAt:
          type: string
          format: date-time
          description: Timestamp when the error occurred.
        level:
          type: string
          description: Severity assigned by the caller.
          enum:
            - debug
            - info
            - warning
            - error
            - critical
        platform:
          type: string
          description: >
            High-level origin of the error. Keep this broad so the API remains
            platform-agnostic.
          examples:
            - web
            - backend
            - mobile
            - worker
            - cli
        environment:
          type: string
          description: Deployment environment such as production or staging.
          examples:
            - production
            - staging
        service:
          $ref: '#/components/schemas/ServiceDescriptor'
        source:
          $ref: '#/components/schemas/ErrorSource'
        error:
          $ref: '#/components/schemas/ErrorPayload'
        context:
          $ref: '#/components/schemas/ErrorContext'

    ServiceDescriptor:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Logical service or application name.
        version:
          type: string
          description: Deployed version, build number, or git SHA.
        instanceId:
          type: string
          description: Optional runtime instance or host identifier.

    ErrorSource:
      type: object
      additionalProperties: false
      required:
        - runtime
        - language
      properties:
        runtime:
          type: string
          description: Runtime that produced the error.
          examples:
            - node
            - browser
            - cpython
            - jvm
        language:
          type: string
          description: Primary implementation language.
          examples:
            - typescript
            - javascript
            - python
            - go
        framework:
          type: string
          description: Framework or library involved, when relevant.
          examples:
            - next.js
            - fastapi
            - django
        component:
          type: string
          description: Application component, module, job, or subsystem.

    ErrorPayload:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        type:
          type: string
          description: Exception or error class/type name.
          examples:
            - TypeError
            - ValueError
        message:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Application-specific or platform-specific error code.
        stack:
          type: string
          description: Stack trace or traceback as text.
        handled:
          type: boolean
          description: Whether the error was caught and handled by the client.
        details:
          $ref: '#/components/schemas/JsonObject'

    ErrorContext:
      type: object
      description: Optional metadata that helps with debugging and correlation.
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'
      properties:
        request:
          $ref: '#/components/schemas/JsonObject'
        user:
          $ref: '#/components/schemas/JsonObject'
        session:
          $ref: '#/components/schemas/JsonObject'
        device:
          $ref: '#/components/schemas/JsonObject'
        correlationId:
          type: string
        tags:
          type: array
          items:
            type: string

    ErrorLogAccepted:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - receivedAt
      properties:
        id:
          type: string
          description: Server-generated identifier for the accepted log.
        status:
          type: string
          enum:
            - accepted
        receivedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    JsonObject:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    JsonValue:
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: 'null'
        - type: array
          items:
            $ref: '#/components/schemas/JsonValue'
        - $ref: '#/components/schemas/JsonObject'
