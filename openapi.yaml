openapi: 3.1.0
info:
  title: Error Logging API
  version: 1.0.0
  summary: Project-based API for provisioning tokens and ingesting application errors.
  description: >
    A platform-agnostic error logging API that provisions per-project API tokens
    and accepts structured error events from web, backend, mobile, CLI, or worker
    runtimes. The payload is intentionally flexible so callers can attach
    runtime-specific details from environments such as Next.js, Python, Node.js,
    or other systems.

servers:
  - url: https://api.example.com
    description: Production

tags:
  - name: Projects
    description: Create projects and issue ingestion tokens.
  - name: Examples
    description: Run local connector examples in development.
  - name: Error Logs
    description: Submit structured error events.
  - name: Source Integrations
    description: Configure upstream providers that AuraKeeper can poll for errors.
  - name: Repair Attempts
    description: List and fetch persisted repair attempt artifacts linked to error logs.

paths:
  /v1/projects:
    post:
      tags:
        - Projects
      operationId: createProject
      summary: Create a project
      description: >
        Creates a new project and returns the long-lived API token that should be
        used when sending error logs for that project.
      security:
        - adminTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            example:
              name: aura-web
              repair:
                checkoutPath: /srv/repos/aura-web
                backend: local
                environment: local
                trustLevel: trusted
                promotionMode: auto
                autoTrigger: true
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreated'
              example:
                id: proj_01HSV70H854RZ8B4C2Q5QF6X5A
                name: aura-web
                token: ak_95f20e153965417ba49d7d88c240b4fb4fbc2f63fcc74291
                repair:
                  checkoutPath: /srv/repos/aura-web
                  backend: local
                  environment: local
                  trustLevel: trusted
                  promotionMode: auto
                  autoTrigger: true
                createdAt: "2026-04-18T08:30:00Z"
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                message: body.name must be a non-empty string
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: Admin token is missing or invalid
  /v1/projects/{projectId}:
    patch:
      tags:
        - Projects
      operationId: updateProject
      summary: Update a project
      description: >
        Updates the stored metadata or repair settings for an existing project.
        Send `"repair": null` to clear the repair target entirely.
      security:
        - adminTokenAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreated'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/examples:
    get:
      tags:
        - Examples
      operationId: listExamples
      summary: List local connector examples
      description: >
        Returns whitelisted connector examples that can be launched by the local
        development backend. This endpoint is intended for local development.
      security:
        - adminTokenAuth: []
      responses:
        '200':
          description: Connector examples
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExampleDefinition'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/examples/{exampleId}/runs:
    post:
      tags:
        - Examples
      operationId: startExampleRun
      summary: Start a local connector example
      description: >
        Starts a whitelisted local connector example process and injects the
        selected project API token into the example environment.
      security:
        - adminTokenAuth: []
      parameters:
        - name: exampleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartExampleRunRequest'
      responses:
        '202':
          description: Example run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleRun'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown example
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/examples/runs/{runId}:
    get:
      tags:
        - Examples
      operationId: getExampleRun
      summary: Get local connector example run status
      security:
        - adminTokenAuth: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Example run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleRun'
        '401':
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/logs/errors:
    get:
      tags:
        - Error Logs
      operationId: listErrorLogs
      summary: List error logs
      description: >
        Returns error logs for the project identified by the supplied API token,
        ordered by most recently created first.
      security:
        - apiTokenAuth: []
      responses:
        '200':
          description: Error logs for the authenticated project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ErrorLog'
              example:
                - id: log_01HSV6M2KQ4T1TA7R8P8W9J1BM
                  state: new_error
                  receivedAt: "2026-04-18T08:32:18Z"
                  createdAt: "2026-04-18T08:32:18Z"
                  eventId: 767d5a66-2b41-4c2e-90e8-6dd0149491df
                  occurredAt: "2026-04-18T08:32:17Z"
                  level: error
                  platform: web
                  environment: production
                  service:
                    name: aura-web
                    version: "2026.04.18"
                  source:
                    runtime: node
                    language: typescript
                    framework: next.js
                    component: app-router
                  error:
                    type: TypeError
                    message: Cannot read properties of undefined
                    handled: false
                  context:
                    tags:
                      - frontend
                      - nextjs
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: API token is missing or invalid
    post:
      tags:
        - Error Logs
      operationId: createErrorLog
      summary: Submit an error log event
      description: >
        Accepts a single error event with platform metadata, normalized error
        attributes, and arbitrary structured details supplied by the client.
      security:
        - apiTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorLogRequest'
            examples:
              nextjs:
                summary: Next.js application error
                value:
                  eventId: 767d5a66-2b41-4c2e-90e8-6dd0149491df
                  occurredAt: "2026-04-18T08:32:17Z"
                  level: error
                  platform: web
                  environment: production
                  service:
                    name: aura-web
                    version: "2026.04.18"
                  source:
                    runtime: node
                    language: typescript
                    framework: next.js
                    component: app-router
                  error:
                    type: TypeError
                    message: Cannot read properties of undefined
                    stack: "TypeError: Cannot read properties of undefined\n    at DashboardPage..."
                    handled: false
                    details:
                      route: /dashboard
                      digest: NEXT_APP_ERROR_01
                      buildId: b42a9a1
                  context:
                    request:
                      method: GET
                      path: /dashboard
                      requestId: req_123
                    user:
                      id: user_42
                    tags:
                      - frontend
                      - nextjs
              python:
                summary: Python backend exception
                value:
                  eventId: b453b95e-0dbb-4b71-978d-f61dcb50adf9
                  occurredAt: "2026-04-18T08:35:02Z"
                  level: critical
                  platform: backend
                  environment: production
                  service:
                    name: aura-api
                    version: "1.12.3"
                  source:
                    runtime: cpython
                    language: python
                    framework: fastapi
                    component: billing-worker
                  error:
                    type: ValueError
                    message: Invalid invoice state transition
                    stack: "Traceback (most recent call last): ..."
                    code: INVALID_STATE
                    handled: true
                    details:
                      module: billing.jobs.reconcile
                      exceptionClass: ValueError
                      invoiceId: inv_987
                      previousState: paid
                      requestedState: refunded
                  context:
                    correlationId: corr_789
                    tags:
                      - backend
                      - billing
      responses:
        '202':
          description: Error log accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorLogAccepted'
              example:
                id: log_01HSV6M2KQ4T1TA7R8P8W9J1BM
                state: new_error
                status: accepted
                receivedAt: "2026-04-18T08:32:18Z"
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                message: occurredAt must be a valid RFC 3339 timestamp
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: API token is missing or invalid
  /v1/sources/sentry:
    post:
      tags:
        - Source Integrations
      operationId: createSentrySource
      summary: Connect a Sentry project
      description: >
        Stores project-scoped Sentry credentials and polling settings so AuraKeeper
        can import error events from Sentry into the standard error log pipeline.
        The Sentry token should have at least project read access for the target
        project.
      security:
        - apiTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSentrySourceRequest'
            example:
              organizationSlug: acme
              projectSlug: aura-web
              authToken: sntrys_1234567890abcdef
              baseUrl: https://sentry.io
              environment: production
              maxEventsPerPoll: 100
              service:
                name: aura-web
                version: "2026.04.18"
              source:
                runtime: node
                language: typescript
                framework: next.js
                component: app-router
      responses:
        '201':
          description: Sentry source created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentrySource'
              example:
                id: sentrysrc_01hsv7z2kq4t1ta7r8p8w9j1bm
                organizationSlug: acme
                projectSlug: aura-web
                baseUrl: https://sentry.io
                environment: production
                maxEventsPerPoll: 100
                service:
                  name: aura-web
                  version: "2026.04.18"
                source:
                  runtime: node
                  language: typescript
                  framework: next.js
                  component: app-router
                createdAt: "2026-04-18T08:40:00Z"
                updatedAt: "2026-04-18T08:40:00Z"
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                message: body.baseUrl must be a valid URL
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: API token is missing or invalid
  /v1/sources/sentry/{sourceId}/poll:
    post:
      tags:
        - Source Integrations
      operationId: pollSentrySource
      summary: Poll Sentry for new error events
      description: >
        Fetches error events from the configured Sentry project since the last
        successful poll, maps them into AuraKeeper's `ErrorLogRequest` format,
        and stores any newly imported events as normal error logs.
      security:
        - apiTokenAuth: []
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
          description: Server-generated Sentry source identifier.
      responses:
        '200':
          description: Sentry poll finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentryPollResult'
              example:
                sourceId: sentrysrc_01hsv7z2kq4t1ta7r8p8w9j1bm
                status: completed
                fetchedCount: 12
                importedCount: 8
                duplicateCount: 3
                filteredCount: 1
                lastPolledAt: "2026-04-18T08:45:00Z"
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: API token is missing or invalid
        '404':
          description: Sentry source not found for the authenticated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: not_found
                message: Sentry source not found
        '502':
          description: Sentry request failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: upstream_error
                message: Sentry rejected the request. Check the auth token and project scope.
  /v1/logs/errors/{logId}/repair-attempts:
    post:
      tags:
        - Repair Attempts
      operationId: createRepairAttemptForErrorLog
      summary: Start a repair attempt for an error log
      description: >
        Queues the orchestrator and fix agents for a specific stored error log
        using the authenticated project's configured repair target.
      security:
        - apiTokenAuth: []
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepairAttemptRequest'
      responses:
        '202':
          description: Repair attempt queued or already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairAttemptAccepted'
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Error log not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Project is missing repair configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Repair Attempts
      operationId: listRepairAttemptsForErrorLog
      summary: List repair attempts for an error log
      description: >
        Returns persisted repair attempts and their artifacts for a specific
        error log owned by the authenticated project.
      security:
        - apiTokenAuth: []
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repair attempts linked to the requested error log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RepairAttempt'
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Error log not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/logs/errors/{logId}/repair-attempts/{repairAttemptId}/apply:
    post:
      tags:
        - Repair Attempts
      operationId: applyRepairAttemptPatch
      summary: Apply a verified patch to the original checkout
      description: >
        Applies the original-target patch artifact from a previously verified
        repair attempt back to the configured source checkout. This is primarily
        used when a project is configured for manual patch promotion after
        verification.
      security:
        - apiTokenAuth: []
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
        - name: repairAttemptId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repair attempt updated after applying the verified patch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairAttempt'
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Error log or repair attempt not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Repair attempt cannot be applied or patch application failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/logs/errors/{logId}/artifacts/{artifactId}:
    get:
      tags:
        - Repair Attempts
      operationId: getRepairArtifact
      summary: Fetch a persisted repair artifact
      description: >
        Streams a persisted artifact file, such as a screenshot, report, or
        patch, for a repair attempt linked to a specific error log.
      security:
        - apiTokenAuth: []
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Missing or invalid API token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Error log or artifact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    adminTokenAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Administrative token used to create new projects.
    apiTokenAuth:
      type: apiKey
      in: header
      name: X-API-Token
      description: Long-lived API token permanently issued for a specific project.

  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable project name.
          examples:
            - aura-web
            - aura-api
        repair:
          $ref: '#/components/schemas/ProjectRepairSettings'

    ProjectCreated:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - token
        - createdAt
      properties:
        id:
          type: string
          description: Server-generated project identifier.
        name:
          type: string
          description: Human-readable project name.
        token:
          type: string
          description: Project token to include in the X-API-Token header for log ingestion.
        repair:
          $ref: '#/components/schemas/ProjectRepairSettings'
        createdAt:
          type: string
          format: date-time

    UpdateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Updated human-readable project name.
        repair:
          oneOf:
            - $ref: '#/components/schemas/ProjectRepairSettings'
            - type: 'null'

    ProjectRepairSettings:
      type: object
      additionalProperties: false
      required:
        - checkoutPath
      properties:
        checkoutPath:
          type: string
          description: Local repository checkout path that AuraKeeper may patch and verify.
        repositoryUrl:
          type: string
          description: Optional repository URL for metadata or traceability.
        baseCommit:
          type: string
          description: Optional commit SHA to associate with repair attempts.
        backend:
          type: string
          enum:
            - auto
            - docker
            - local
        environment:
          type: string
          enum:
            - production
            - hosted
            - local
            - development
        trustLevel:
          type: string
          enum:
            - trusted
            - untrusted
        promotionMode:
          type: string
          enum:
            - auto
            - manual
          description: Whether verified patches are auto-applied back to the original checkout or left for manual apply.
        autoTrigger:
          type: boolean
          description: Whether newly accepted error logs should automatically queue a repair attempt.

    CreateSentrySourceRequest:
      type: object
      additionalProperties: false
      required:
        - organizationSlug
        - projectSlug
        - authToken
      properties:
        organizationSlug:
          type: string
          description: Sentry organization slug.
        projectSlug:
          type: string
          description: Sentry project slug inside the organization.
        authToken:
          type: string
          description: >
            Sentry API token with permission to read project error events.
        baseUrl:
          type: string
          format: uri
          description: Base Sentry host URL. Defaults to https://sentry.io.
        environment:
          type: string
          description: Optional environment filter applied to imported Sentry events.
        maxEventsPerPoll:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
          description: Maximum number of Sentry events to ingest during one poll.
        service:
          $ref: '#/components/schemas/SentryServiceOverrides'
        source:
          $ref: '#/components/schemas/SentrySourceOverrides'

    SentryServiceOverrides:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        version:
          type: string
        instanceId:
          type: string

    SentrySourceOverrides:
      type: object
      additionalProperties: false
      properties:
        runtime:
          type: string
        language:
          type: string
        framework:
          type: string
        component:
          type: string

    SentrySource:
      type: object
      additionalProperties: false
      required:
        - id
        - organizationSlug
        - projectSlug
        - baseUrl
        - maxEventsPerPoll
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Server-generated Sentry source identifier.
        organizationSlug:
          type: string
        projectSlug:
          type: string
        baseUrl:
          type: string
          format: uri
        environment:
          type: string
        maxEventsPerPoll:
          type: integer
        service:
          $ref: '#/components/schemas/SentryServiceOverrides'
        source:
          $ref: '#/components/schemas/SentrySourceOverrides'
        lastPolledAt:
          type: string
          format: date-time
        lastPollError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SentryPollResult:
      type: object
      additionalProperties: false
      required:
        - sourceId
        - status
        - fetchedCount
        - importedCount
        - duplicateCount
        - filteredCount
        - lastPolledAt
      properties:
        sourceId:
          type: string
        status:
          type: string
          enum:
            - completed
        fetchedCount:
          type: integer
        importedCount:
          type: integer
        duplicateCount:
          type: integer
        filteredCount:
          type: integer
        lastPolledAt:
          type: string
          format: date-time

    ExampleDefinition:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - description
      properties:
        id:
          type: string
          description: Stable example identifier used by the runner.
        name:
          type: string
          description: Human-readable stack name.
        description:
          type: string
          description: Short description of the runtime error demo.
        manual:
          type: string
          description: Optional manual action needed after the process starts.

    StartExampleRunRequest:
      type: object
      additionalProperties: false
      required:
        - apiToken
      properties:
        apiToken:
          type: string
          description: Project API token injected into the example process.
        endpoint:
          type: string
          description: Optional ingestion endpoint override.

    ExampleRunStatus:
      type: string
      enum:
        - running
        - completed
        - failed

    ExampleRun:
      type: object
      additionalProperties: false
      required:
        - id
        - exampleId
        - status
        - startedAt
        - stdout
        - stderr
      properties:
        id:
          type: string
        exampleId:
          type: string
        status:
          $ref: '#/components/schemas/ExampleRunStatus'
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        exitCode:
          type:
            - integer
            - 'null'
        signal:
          type:
            - string
            - 'null'
        triggerStatus:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
        error:
          type: string
        manual:
          type: string

    ErrorLogState:
      type: string
      enum:
        - new_error
        - repro_started
        - repro_succeeded
        - repro_failed
        - fix_started
        - fix_succeeded
        - fix_failed
        - verify_started
        - verify_succeeded
        - verify_failed
        - deploy_started
        - deploy_succeeded
        - deploy_failed

    ErrorLogRequest:
      type: object
      additionalProperties: false
      required:
        - occurredAt
        - level
        - platform
        - service
        - source
        - error
      properties:
        eventId:
          type: string
          description: Client-generated identifier for idempotency or correlation.
          examples:
            - 767d5a66-2b41-4c2e-90e8-6dd0149491df
        occurredAt:
          type: string
          format: date-time
          description: Timestamp when the error occurred.
        level:
          type: string
          description: Severity assigned by the caller.
          enum:
            - debug
            - info
            - warning
            - error
            - critical
        platform:
          type: string
          description: >
            High-level origin of the error. Keep this broad so the API remains
            platform-agnostic.
          examples:
            - web
            - backend
            - mobile
            - worker
            - cli
        environment:
          type: string
          description: Deployment environment such as production or staging.
          examples:
            - production
            - staging
        service:
          $ref: '#/components/schemas/ServiceDescriptor'
        source:
          $ref: '#/components/schemas/ErrorSource'
        error:
          $ref: '#/components/schemas/ErrorPayload'
        context:
          $ref: '#/components/schemas/ErrorContext'

    ErrorLog:
      allOf:
        - $ref: '#/components/schemas/ErrorLogRequest'
        - type: object
          additionalProperties: false
          required:
            - id
            - state
            - receivedAt
            - createdAt
          properties:
            id:
              type: string
              description: Server-generated identifier for the stored log.
            state:
              $ref: '#/components/schemas/ErrorLogState'
            receivedAt:
              type: string
              format: date-time
            createdAt:
              type: string
              format: date-time

    ServiceDescriptor:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Logical service or application name.
        version:
          type: string
          description: Deployed version, build number, or git SHA.
        instanceId:
          type: string
          description: Optional runtime instance or host identifier.

    ErrorSource:
      type: object
      additionalProperties: false
      required:
        - runtime
        - language
      properties:
        runtime:
          type: string
          description: Runtime that produced the error.
          examples:
            - node
            - browser
            - cpython
            - jvm
        language:
          type: string
          description: Primary implementation language.
          examples:
            - typescript
            - javascript
            - python
            - go
        framework:
          type: string
          description: Framework or library involved, when relevant.
          examples:
            - next.js
            - fastapi
            - django
        component:
          type: string
          description: Application component, module, job, or subsystem.

    ErrorPayload:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        type:
          type: string
          description: Exception or error class/type name.
          examples:
            - TypeError
            - ValueError
        message:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Application-specific or platform-specific error code.
        stack:
          type: string
          description: Stack trace or traceback as text.
        handled:
          type: boolean
          description: Whether the error was caught and handled by the client.
        details:
          $ref: '#/components/schemas/JsonObject'

    ErrorContext:
      type: object
      description: Optional metadata that helps with debugging and correlation.
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'
      properties:
        request:
          $ref: '#/components/schemas/JsonObject'
        user:
          $ref: '#/components/schemas/JsonObject'
        session:
          $ref: '#/components/schemas/JsonObject'
        device:
          $ref: '#/components/schemas/JsonObject'
        correlationId:
          type: string
        tags:
          type: array
          items:
            type: string

    ErrorLogAccepted:
      type: object
      additionalProperties: false
      required:
        - id
        - state
        - status
        - receivedAt
      properties:
        id:
          type: string
          description: Server-generated identifier for the accepted log.
        state:
          $ref: '#/components/schemas/ErrorLogState'
        status:
          type: string
          enum:
            - accepted
        receivedAt:
          type: string
          format: date-time

    RepairArtifact:
      type: object
      additionalProperties: false
      required:
        - id
        - repairAttemptId
        - kind
        - fileName
        - relativePath
        - contentType
        - byteSize
        - createdAt
        - url
      properties:
        id:
          type: string
        repairAttemptId:
          type: string
        kind:
          type: string
        fileName:
          type: string
        relativePath:
          type: string
        contentType:
          type: string
        byteSize:
          type: integer
        createdAt:
          type: string
          format: date-time
        url:
          type: string

    CreateRepairAttemptRequest:
      type: object
      additionalProperties: false
      properties:
        issueSummary:
          type: string
          description: Optional human-written summary to prepend to the agent task.

    RepairAttemptAccepted:
      type: object
      additionalProperties: false
      required:
        - status
        - state
        - logId
      properties:
        status:
          type: string
          enum:
            - queued
            - already_running
        state:
          $ref: '#/components/schemas/ErrorLogState'
        logId:
          type: string

    RepairAttempt:
      type: object
      additionalProperties: false
      required:
        - id
        - errorLogId
        - status
        - prGate
        - stage
        - startedAt
        - finishedAt
        - createdAt
        - artifacts
      properties:
        id:
          type: string
        errorLogId:
          type: string
        status:
          type: string
        prGate:
          type: string
          enum:
            - allow
            - block
        stage:
          type: string
        selectedBackend:
          type: string
        profileId:
          type: string
        targetCheckoutPath:
          type: string
        promotionMode:
          type: string
          enum:
            - auto
            - manual
        sourcePatchStatus:
          type: string
          enum:
            - not_requested
            - pending_manual
            - applied
            - failed
        sourcePatchAppliedAt:
          type: string
          format: date-time
        sourcePatchError:
          type: string
        failureReason:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/RepairArtifact'

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    JsonObject:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    JsonValue:
      anyOf:
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: 'null'
        - type: array
          items:
            $ref: '#/components/schemas/JsonValue'
        - $ref: '#/components/schemas/JsonObject'
